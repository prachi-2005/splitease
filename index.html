<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SplitEase — Split Expenses Effortlessly</title>
  <meta name="description" content="SplitEase: A modern expense-splitting app. Track shared expenses, settle debts, and manage group finances effortlessly." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-gradient"></div>

  <!-- ───────── AUTH ───────── -->
  <div class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-card glass float-card">
        <div class="auth-logo">SplitEase</div>
        <p class="auth-subtitle">Split expenses with friends, effortlessly.</p>

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="loginTabBtn" onclick="switchAuthTab('login')">Log In</button>
          <button class="auth-tab" id="signupTabBtn" onclick="switchAuthTab('signup')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn-primary">Log In</button>
          <div class="auth-error" id="loginError"></div>
        </form>

        <!-- Signup Form -->
        <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
          <div class="form-group">
            <label for="signupName">Full Name</label>
            <input type="text" id="signupName" placeholder="John Doe" required />
          </div>
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" placeholder="Min 6 characters" minlength="6" required />
          </div>
          <button type="submit" class="btn btn-primary">Create Account</button>
          <div class="auth-error" id="signupError"></div>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
</body>
</html>
